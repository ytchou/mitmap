name: Frontend CI

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.js'
      - '**/*.jsx'
      - 'src/app/favicon.ico'
      - 'src/app/*.png'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Nudge on potential e2e drift
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- e2e-drift-nudge -->';
            const pr = context.payload.pull_request;

            if (!pr) {
              core.info('No pull request context; skipping.');
              return;
            }

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              }
            );

            const filenames = files.map((file) => file.filename);
            const touchesUi = filenames.some((name) =>
              name.startsWith('app/') ||
              name.startsWith('src/app/') ||
              name.startsWith('components/') ||
              name.startsWith('src/components/') ||
              /(^|\/)route\.(ts|tsx|js|jsx)$/.test(name)
            );
            const touchesE2E = filenames.some((name) => name.startsWith('e2e/'));

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                per_page: 100,
              }
            );

            const existing = comments.find((comment) =>
              comment.body?.includes(marker) &&
              comment.user?.type === 'Bot'
            );

            if (touchesUi && !touchesE2E) {
              const body = [
                marker,
                'Heads up: this PR changes `app/`, `src/app/`, `components/`, `src/components/`, or a `route.*` file, but it does not touch `e2e/`.',
                '',
                'Please check for potential e2e drift and update coverage if the UI or routing behavior changed.',
              ].join('\n');

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
                core.info('Updated existing e2e drift nudge comment.');
                return;
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
              core.info('Created e2e drift nudge comment.');
              return;
            }

            if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              });
              core.info('Removed stale e2e drift nudge comment.');
              return;
            }

            core.info('No e2e drift nudge needed.');
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Verify favicon is RGBA
        run: node scripts/check-favicon-rgba.mjs
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm tsc --noEmit
      - run: pnpm test -- --coverage

  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      # Cloudflare Turnstile always-pass test keys (public test values, not real secrets)
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: npx playwright install --with-deps chromium webkit
      - run: pnpm exec playwright test --project=smoke-chromium --project=smoke-webkit
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Production build gate. Nothing else in CI runs `next build`, and Railway builds on
  # merge — so this catches build-only failures (SSG/ISR generation, server/client
  # boundary, next/image config, route/metadata exports) before they break the deploy.
  # Runs in parallel with the jobs above; the .next/cache restore keeps it incremental.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Build statically generates category pages (SSG/ISR), which read Supabase, and
      # inlines NEXT_PUBLIC_* values — so the build needs the same env Railway provides.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      # Cloudflare Turnstile always-pass test keys (public test values, not real secrets)
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx', 'src/**/*.js', 'src/**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-
      - name: Production build
        run: pnpm build
