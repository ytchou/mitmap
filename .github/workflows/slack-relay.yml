name: Slack Relay

on:
  push:
    paths:
      - "slack-messages/*.json"

jobs:
  relay:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Send to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          sent=0
          failed=0
          for file in slack-messages/*.json; do
            [ -f "$file" ] || continue
            status=$(curl -s -o /dev/null -w '%{http_code}' \
              -X POST -H 'Content-type: application/json' \
              -d @"$file" "$SLACK_WEBHOOK_URL")
            if [ "$status" = "200" ]; then
              echo "Delivered: $file"
              rm "$file"
              sent=$((sent + 1))
            else
              echo "Failed ($status): $file"
              failed=$((failed + 1))
            fi
          done
          echo "Sent: $sent, Failed: $failed"
          [ "$failed" -eq 0 ] || exit 1

      - name: Cleanup delivered files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add slack-messages/
          git diff --staged --quiet || git commit -m "chore: cleanup delivered slack messages [skip ci]"
          git push
