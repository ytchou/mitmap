name: E2E Nightly (Deep)

on:
  schedule:
    - cron: '0 22 * * *' # 06:00 TST (UTC+8) daily
  workflow_dispatch: # allow manual trigger

jobs:
  e2e-deep:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x-0000000000000000000AA
      TURNSTILE_SECRET_KEY: 0x0000000000000000000000000000000000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: npx playwright install --with-deps chromium
      - run: pnpm exec playwright test --project=deep
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-nightly
          path: playwright-report/
          retention-days: 14
